<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f0f4f8"/>
  <!-- Grid nền -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#dde3ea" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#dde3ea" stroke-width="1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#dde3ea" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="399" y1="0" x2="399" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="532" y1="0" x2="532" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="665" y1="0" x2="665" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <!-- Đường biểu đồ tăng trưởng — xu hướng đi lên rõ ràng -->
  <polyline
    points="80,480 160,430 240,400 320,360 400,310 480,260 560,210 640,170 720,130"
    fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Vùng tô dưới đường -->
  <polygon
    points="80,480 160,430 240,400 320,360 400,310 480,260 560,210 640,170 720,130 720,540 80,540"
    fill="#22c55e" fill-opacity="0.08"/>
  <!-- Thanh cột tăng dần -->
  <rect x="100" y="490" width="35" height="50" rx="2" fill="#22c55e" fill-opacity="0.4"/>
  <rect x="185" y="470" width="35" height="70" rx="2" fill="#22c55e" fill-opacity="0.4"/>
  <rect x="270" y="450" width="35" height="90" rx="2" fill="#22c55e" fill-opacity="0.4"/>
  <rect x="355" y="420" width="35" height="120" rx="2" fill="#22c55e" fill-opacity="0.5"/>
  <rect x="440" y="390" width="35" height="150" rx="2" fill="#22c55e" fill-opacity="0.5"/>
  <rect x="525" y="355" width="35" height="185" rx="2" fill="#22c55e" fill-opacity="0.6"/>
  <rect x="610" y="310" width="35" height="230" rx="2" fill="#22c55e" fill-opacity="0.6"/>
  <!-- Mũi tên chỉ hướng tăng -->
  <polygon points="700,90 720,130 680,130" fill="#22c55e"/>
  <!-- Label -->
  <text x="80" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#64748b" letter-spacing="3">TĂNG TRƯỞNG</text>
  <text x="80" y="100" font-family="sans-serif" font-size="11" fill="#94a3b8">Xu hướng tích cực</text>
</svg>
