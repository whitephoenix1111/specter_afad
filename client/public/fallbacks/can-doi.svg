<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f0f4f8"/>
  <!-- Grid nền -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#dde3ea" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#dde3ea" stroke-width="1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#dde3ea" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="399" y1="0" x2="399" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="532" y1="0" x2="532" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <line x1="665" y1="0" x2="665" y2="600" stroke="#dde3ea" stroke-width="1"/>
  <!-- Đường cân bằng ngang -->
  <line x1="80" y1="310" x2="720" y2="310" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Đường biểu đồ cân đối — lên xuống nhẹ nhàng quanh trục -->
  <polyline
    points="80,370 160,290 240,340 320,260 400,310 480,275 560,330 640,280 720,305"
    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Vùng tô dưới đường -->
  <polygon
    points="80,370 160,290 240,340 320,260 400,310 480,275 560,330 640,280 720,305 720,520 80,520"
    fill="#3b82f6" fill-opacity="0.07"/>
  <!-- Thanh cột nhỏ ở dưới -->
  <rect x="120" y="460" width="30" height="60" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="200" y="450" width="30" height="70" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="280" y="455" width="30" height="65" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="360" y="445" width="30" height="75" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="440" y="452" width="30" height="68" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="520" y="448" width="30" height="72" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <rect x="600" y="453" width="30" height="67" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  <!-- Label -->
  <text x="80" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#64748b" letter-spacing="3">CÂN ĐỐI</text>
  <text x="80" y="100" font-family="sans-serif" font-size="11" fill="#94a3b8">Biến động ổn định</text>
</svg>
